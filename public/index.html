<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoCreate</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Full-bleed canvas -->
  <canvas id="canvas-display"></canvas>
  <canvas id="canvas-interaction"></canvas>

  <!-- AI ambient glow (edge of screen) -->
  <div id="ai-glow" class="ai-glow"></div>

  <!-- Floating controls — appear on mouse proximity -->
  <div id="controls" class="controls">

    <!-- Brushes as abstract dots -->
    <div class="control-cluster" id="brush-cluster">
      <button class="dot dot-brush active" data-tool="pen" title="Pen">
        <span class="dot-inner" style="width:6px;height:6px"></span>
      </button>
      <button class="dot dot-brush" data-tool="pencil" title="Pencil">
        <span class="dot-inner textured" style="width:5px;height:5px"></span>
      </button>
      <button class="dot dot-brush" data-tool="marker" title="Marker">
        <span class="dot-inner" style="width:10px;height:6px;border-radius:3px"></span>
      </button>
      <button class="dot dot-brush" data-tool="eraser" title="Eraser">
        <span class="dot-inner eraser-dot"></span>
      </button>
    </div>

    <!-- Colors as tiny circles -->
    <div class="control-cluster" id="color-cluster">
      <button class="dot dot-color active" data-color="#1a1a1a" style="--c:#1a1a1a"></button>
      <button class="dot dot-color" data-color="#c0392b" style="--c:#c0392b"></button>
      <button class="dot dot-color" data-color="#2980b9" style="--c:#2980b9"></button>
      <button class="dot dot-color" data-color="#27ae60" style="--c:#27ae60"></button>
      <button class="dot dot-color" data-color="#f39c12" style="--c:#f39c12"></button>
      <button class="dot dot-color" data-color="#8e44ad" style="--c:#8e44ad"></button>
      <input type="color" id="color-picker" value="#1a1a1a" class="hidden-picker">
      <button class="dot dot-color-custom" id="custom-color-btn" title="Custom color">
        <span class="plus">+</span>
      </button>
    </div>

    <!-- Size: a single draggable line -->
    <div class="control-cluster" id="size-cluster">
      <input type="range" id="brush-size" min="1" max="40" value="4" class="size-rail">
    </div>

    <!-- AI trigger -->
    <button id="btn-ai-trigger" class="dot dot-ai" title="Ask AI to draw (Space)">
      <span class="ai-spark"></span>
    </button>
  </div>

  <!-- Minimal top-right actions (nearly invisible) -->
  <div id="actions" class="actions">
    <button id="btn-undo" class="ghost-btn" title="Undo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button id="btn-redo" class="ghost-btn" title="Redo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
    </button>
    <button id="btn-clear" class="ghost-btn" title="Clear">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button id="btn-toggle-ai-layer" class="ghost-btn active" title="Toggle AI layer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <!-- Whisper text for AI state -->
  <div id="ai-whisper" class="ai-whisper"></div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" class="tutorial-overlay">
    <div class="tutorial-card">
      <div class="tutorial-steps">
        <div class="tutorial-step active" data-step="0">
          <div class="tutorial-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
              <path d="M24 14c-2 0-4 2-4 4s2 6 4 10c2-4 4-8 4-10s-2-4-4-4z" fill="currentColor" opacity="0.6"/>
              <circle cx="24" cy="32" r="2" fill="currentColor" opacity="0.6"/>
            </svg>
          </div>
          <h2>Draw anything</h2>
          <p>Sketch a flower, a house, a fish — whatever comes to mind.</p>
        </div>
        <div class="tutorial-step" data-step="1">
          <div class="tutorial-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
              <circle cx="24" cy="24" r="6" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="24" cy="24" r="2" fill="currentColor"/>
              <path d="M14 24h-4M38 24h-4M24 14v-4M24 38v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>AI recognizes it</h2>
          <p>The AI figures out what you drew and thinks of something that goes with it.</p>
        </div>
        <div class="tutorial-step" data-step="2">
          <div class="tutorial-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
              <path d="M16 20c0-2 2-4 4-4s4 2 4 4-2 6-4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M30 16c1-1 3-1 4 0s1 3 0 4l-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M32 26c2 0 4 1 4 3s-2 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="33" cy="22" r="1" fill="currentColor" opacity="0.4"/>
              <circle cx="36" cy="18" r="0.8" fill="currentColor" opacity="0.3"/>
            </svg>
          </div>
          <h2>It draws a companion</h2>
          <p>A flower gets a butterfly. A fish gets bubbles. Your scene grows together.</p>
        </div>
      </div>
      <div class="tutorial-nav">
        <div class="tutorial-dots">
          <span class="tutorial-dot active" data-dot="0"></span>
          <span class="tutorial-dot" data-dot="1"></span>
          <span class="tutorial-dot" data-dot="2"></span>
        </div>
        <button id="tutorial-next" class="tutorial-btn">next</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
